spring:
  application:
    name: config-server
  profiles:
    active: local,native
  cloud:
    config:
      server:
        native:
          search-locations: file:./config-repo

server:
  port: 8888

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health,info
